id: thai-green-curry
title: Thai Green Curry
description: Fragrant, medium-heat green curry with chicken, snap peas, and a big handful of basil. Weeknight-fast but tastes like you fussed.
servings: 4
time:
  prep_minutes: 20
  cook_minutes: 25
tags: [thai, curry, dinner, weeknight]
ingredients:
  - { item: green curry paste, quantity: 3, unit: tbsp }
  - { item: coconut milk, quantity: 400, unit: ml, note: full-fat }
  - { item: chicken thigh, quantity: 500, unit: g, note: "boneless, cut into chunks" }
  - { item: sugar snap peas, quantity: 150, unit: g }
  - { item: fish sauce, quantity: 1, unit: tbsp }
  - { item: brown sugar, quantity: 1, unit: tsp }
  - { item: thai basil leaves, quantity: 1, unit: bunch }
  - { item: jasmine rice, quantity: 300, unit: g, note: to serve }
steps:
  - Fry the curry paste in a little oil over medium heat until fragrant, about 1 minute.
  - Pour in a third of the coconut milk and simmer until the oil starts to separate, 3–4 minutes.
  - Add the chicken and stir to coat, then pour in the remaining coconut milk.
  - Simmer gently until the chicken is cooked through, about 15 minutes.
  - Stir in the snap peas, fish sauce, and sugar; cook 2 more minutes.
  - Off the heat, fold in the basil. Serve over jasmine rice.
notes: Use full-fat coconut milk — light versions make a thin, sad sauce.
tips:
  - Toast the paste a minute longer for a deeper, darker flavor.
  - Swap chicken for tofu and fish sauce for soy to make it vegetarian.
source: Sample recipe — replace with your own!
