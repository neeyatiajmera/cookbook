id: yellow-toor-dal-with-bottle-gourd
title: Yellow Toor Dal with Bottle Gourd
servings: 2
ingredients:
  - item: yellow toor dal
    quantity: 0.5
    unit: cup
  - item: orange masoor dal
    quantity: 0.5
    unit: cup
  - item: bottle gourd (toodi/lauki), peeled and chopped
    quantity: 0.5
    unit: cup
  - item: turmeric powder
    quantity: 0.5
    unit: tsp
  - item: salt
    quantity: 1
    unit: tsp
  - item: tomato, chopped
    quantity: 0.5
    unit: piece
    note: optional
  - item: oil
    quantity: 0.5
    unit: tbsp
  - item: hing (asafoetida)
    quantity: 0.25
    unit: tsp
  - item: jeera (cumin seeds)
    quantity: 1
    unit: tsp
  - item: ginger garlic paste
    quantity: 1
    unit: tbsp
  - item: onions, finely chopped
    quantity: 0.25
    unit: cup
  - item: coriander powder
    quantity: 0.5
    unit: tsp
  - item: jeera powder (cumin powder)
    quantity: 0.5
    unit: tsp
  - item: fresh coriander, chopped
    note: for garnish
steps:
  - Wash the yellow toor dal and orange masoor dal together a couple of times under water until the water runs clear.
  - Peel and chop the bottle gourd into small pieces.
  - Add the washed dals and chopped bottle gourd to a steel container suitable for the Instant Pot.
  - Add the turmeric powder, salt, and chopped tomato (if using) to the container.
  - Place the container in the Instant Pot and pressure cook on high for 10 minutes.
  - After cooking, allow 5 minutes of natural pressure release.
  - Carefully open the pressure cooker and remove the dal.
  - Heat half tablespoon of oil in a pan for tempering.
  - Add hing (asafoetida) and let it sizzle.
  - Add jeera (cumin seeds) and let them crackle.
  - Add ginger garlic paste and sauté briefly.
  - Add the finely chopped onions and cook until translucent.
  - Add coriander powder and jeera powder, and adjust salt if needed.
  - Add the cooked dal to the tempering and mix well.
  - Garnish with chopped fresh coriander and serve.
